<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVMbot — Login</title>
<style>
  :root {
    /* ── Brand ── */
    --primary: #0d47a1;
    --secondary: #10b981;
    --accent: #f59e0b;
    --danger: #ef4444;
    /* ── Legacy ── */
    --green: #768064;
    --green-light: #E7Ecda;
    --green-dark: #5a6350;
    /* ── Neutrals ── */
    --neutral-50: #f9fafb;
    --neutral-100: #f3f4f6;
    --neutral-200: #e5e7eb;
    --neutral-400: #9ca3af;
    --neutral-600: #4b5563;
    --neutral-900: #111827;
    /* ── Typography ── */
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-size-xs: 0.75rem;
    --font-size-sm: 0.875rem;
    --font-size-base: 1rem;
    --font-size-lg: 1.125rem;
    --font-size-xl: 1.25rem;
    --font-size-2xl: 1.5rem;
    /* ── Spacing ── */
    --space-xs: 0.25rem;
    --space-sm: 0.5rem;
    --space-md: 1rem;
    --space-lg: 1.5rem;
    --space-xl: 2rem;
    /* ── Radius ── */
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    /* ── Shadows ── */
    --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--neutral-100);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(118,128,100,.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(118,128,100,.06) 0%, transparent 50%),
      var(--neutral-100);
  }

  .card {
    position: relative; z-index: 1;
    background: #fff;
    border-radius: 20px;
    padding: 44px 40px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.1), 0 4px 16px rgba(0,0,0,.06);
  }

  .logo {
    text-align: center;
    margin-bottom: 8px;
  }
  .logo .icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, #768064, #5a6350);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.6rem; margin-bottom: 14px;
    box-shadow: 0 8px 20px rgba(118,128,100,.3);
  }
  .logo h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; }
  .logo h1 b { color: #768064; }
  .logo p { font-size: .82rem; color: var(--neutral-400); margin-top: 4px; }

  .badge {
    display: inline-block; background: #f4f6ee; color: #4a5240;
    padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700;
    margin-top: 6px; letter-spacing: .04em;
  }

  .divider { height: 1px; background: #e2e8f0; margin: 28px 0; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: .78rem; font-weight: 600;
    color: var(--neutral-600); margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap .icon-left {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: .95rem; pointer-events: none;
  }
  .form-group input {
    width: 100%; padding: 11px 14px 11px 38px;
    border: 1.5px solid var(--neutral-200); border-radius: 10px;
    font-size: .88rem; color: var(--neutral-900); background: var(--neutral-50);
    font-family: inherit; transition: all .15s;
  }
  .form-group input:focus {
    outline: none; border-color: #768064;
    background: #fff; box-shadow: 0 0 0 3px rgba(118,128,100,.15);
  }
  .show-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: .8rem;
    color: var(--neutral-400); padding: 4px;
  }
  .show-pw:hover { color: #768064; }

  .error-msg {
    background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
    padding: 10px 14px; border-radius: 8px; font-size: .82rem;
    margin-bottom: 16px; display: none; align-items: center; gap: 8px;
  }
  .error-msg.show { display: flex; }

  .btn-login {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #768064, #5a6350);
    color: #fff; border: none; border-radius: 10px;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all .2s;
    box-shadow: 0 4px 12px rgba(118,128,100,.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(118,128,100,.35); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; margin-top: 24px; font-size: .75rem; color: #94a3b8; }
  .footer span { color: #768064; font-weight: 600; }

  /* Shake animation for wrong password */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  .shake { animation: shake .4s ease; }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<div class="card" id="card">
  <div class="logo">
    <div class="icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div>
    <h1>TVM<b>bot</b></h1>
    <p>Villa Management AI</p>
    <span class="badge">TVMbot v2.0 · Private Access</span>
  </div>

  <div class="divider"></div>

  <div class="error-msg" id="error-msg" role="alert" aria-live="assertive" aria-atomic="true">
    <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
    <span id="error-text">Invalid username or password.</span>
  </div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <span class="icon-left"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required aria-label="Username">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon-left"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required aria-label="Password">
        <button type="button" class="show-pw" onclick="togglePw()" aria-label="Toggle password visibility"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="login-btn">
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">Sign In to TVMbot</span>
    </button>
  </form>

  <div style="text-align:center;margin-top:12px;">
      <a href="#" onclick="alert('Contact your administrator to reset your password.');return false;" style="font-size:.78rem;color:#64748b;text-decoration:none;">Forgot password?</a>
    </div>
    <div class="footer">
    Secured · <span>thevillamanagers.cloud</span> · Private
  </div>
</div>

<script>
  // Auto-focus username field
  document.getElementById('username').focus();

  function togglePw() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  async function doLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const errorMsg = document.getElementById('error-msg');

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Signing in...';
    errorMsg.classList.remove('show');

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const d = await res.json();

      if (d.success) {
        btnText.textContent = '✓ Redirecting...';
        window.location.href = '/';
      } else {
        // Error state
        document.getElementById('error-text').textContent = d.message || 'Invalid username or password.';
        errorMsg.classList.add('show');
        document.getElementById('card').classList.add('shake');
        setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch(err) {
      document.getElementById('error-text').textContent = 'Cannot reach server. Check your connection.';
      errorMsg.classList.add('show');
    }

    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Sign In to TVMbot';
  }

  // Check for ?error param in URL (e.g. after failed redirect)
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    document.getElementById('error-text').textContent = 'Please log in to access TVMbot.';
    document.getElementById('error-msg').classList.add('show');
  }
</script>
</body>
</html>
